name: Package Apps

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  linux:
    name: Linux desktop packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run dist:linux
      - uses: actions/upload-artifact@v4
        with:
          name: astra-voxel-ark-linux
          path: release/*
          if-no-files-found: error

  android:
    name: Android debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - run: npm ci
      - run: npm run android:sync
      - run: cd android && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: astra-voxel-ark-android-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  windows:
    name: Windows desktop packages
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run dist:windows
      - uses: actions/upload-artifact@v4
        with:
          name: astra-voxel-ark-windows
          path: release/*
          if-no-files-found: error
